<html>
    <head>
        <style>
            #outer{
                height: 300px;
                width: 600px;

            }

                width: 600px;
                background: lightgray;
                border-radius: 30px;

                padding-top: 80px;

                font-weight: 50px;
                font-size: 100px;
                box-shadow: 50px 50px 300px rgba(41, 41, 41, 1) inset;

                width: 250px;

                float: left;
                box-shadow: 0px 1px 1px  rgba(41, 41, 41, 1) ;

                border: none;
            }
            .w{
                height: 25px;
                width: 100px;
                float: left;
                box-shadow: 25px 25px 100px rgba(41, 41, 41, 1) inset;
                border-radius: 10px;
            }

        </style>
    </head>
    <body>
        <div id="outer">
            <div id="a">10 : 38 </div>
            <div id="b">
                <div class="q"></div>

                <div class="q"></div>
            </div>
        </div>

        </div>
